name: Build and Release

on:
  push:
    branches:
      - main
      - develop
      - 'ci-sandbox/dev-*'
      - 'dev-*'
    tags:
      - 'release-*'
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., release-v1.0.0)'
        required: true
        type: string
      draft:
        description: 'Create as draft release'
        required: false
        default: true
        type: boolean
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_BACKTRACE: 1
  RUST_LOG: debug

jobs:
  # macOS Intel (x86_64)
  build-macos-intel:
    name: Build macOS Intel
    runs-on: macos-15-intel
    timeout-minutes: 60
    continue-on-error: true
    outputs:
      artifact-path: ${{ steps.upload.outputs.artifact-path }}
    steps:
      - name: Log build info
        run: |
          echo "=== Build Info ==="
          echo "Platform: macOS Intel (x86_64)"
          echo "Runner: ${{ runner.os }} ${{ runner.arch }}"
          echo "Ref: ${{ github.ref }}"
          echo "Event: ${{ github.event_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "=================="

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log environment
        run: |
          echo "=== Environment ==="
          echo "Node version: $(node --version 2>/dev/null || echo 'not installed')"
          echo "pnpm version: $(pnpm --version 2>/dev/null || echo 'not installed')"
          echo "Rust version: $(rustc --version 2>/dev/null || echo 'not installed')"
          echo "Cargo version: $(cargo --version 2>/dev/null || echo 'not installed')"
          echo "==================="

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install macOS system dependencies
        run: |
          echo "=== Installing macOS system dependencies ==="
          brew install ffmpeg pkg-config
          echo "PKG_CONFIG_PATH=$(brew --prefix)/lib/pkgconfig:$(brew --prefix ffmpeg)/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
          pkg-config --modversion libavutil
          echo "==========================================="

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: x86_64-apple-darwin

      - name: Verify Rust installation
        run: |
          echo "=== Rust Installation ==="
          rustc --version
          cargo --version
          rustup show
          rustup target list --installed
          echo "========================="

      - name: Install dependencies
        run: |
          echo "=== Installing Node dependencies ==="
          pnpm install
          echo "===================================="

      - name: Install Tauri CLI
        run: |
          echo "=== Installing Tauri CLI ==="
          cargo install tauri-cli --version '^2.0.0' --locked --verbose
          cargo tauri --version
          echo "============================"

      - name: Build Tauri app
        run: |
          echo "=== Building Tauri app for x86_64-apple-darwin ==="
          cargo tauri build --target x86_64-apple-darwin --verbose
          echo "=================================================="
        env:
          CI: true
          RUST_BACKTRACE: full

      - name: List build outputs
        run: |
          echo "=== Build outputs ==="
          ls -la src-tauri/target/x86_64-apple-darwin/release/ 2>/dev/null || echo 'release dir not found'
          ls -la src-tauri/target/x86_64-apple-darwin/release/bundle/ 2>/dev/null || echo 'bundle dir not found'
          find src-tauri/target/x86_64-apple-darwin/release/bundle -type f -name "*.dmg" 2>/dev/null || echo 'no dmg files found'
          find src-tauri/target/x86_64-apple-darwin/release/bundle -type f -name "*.app" 2>/dev/null || echo 'no app files found'
          echo "===================="

      - name: Prepare artifacts
        id: upload
        run: |
          echo "=== Preparing artifacts ==="
          mkdir -p release-artifacts
          echo "Copying DMG files..."
          cp src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg release-artifacts/ 2>/dev/null && echo "DMG files copied" || echo "No DMG files found"
          echo "Copying APP files..."
          cp -r src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app release-artifacts/ 2>/dev/null && echo "APP files copied" || echo "No APP files found"
          echo "Artifacts in release-artifacts:"
          ls -la release-artifacts/
          echo "artifact-path=release-artifacts" >> $GITHUB_OUTPUT
          echo "==========================="

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: subtitle-forge-macos-intel
          path: release-artifacts/*
          if-no-files-found: warn

  # macOS Apple Silicon (aarch64)
  build-macos-arm:
    name: Build macOS Apple Silicon
    runs-on: macos-latest
    timeout-minutes: 60
    continue-on-error: true
    outputs:
      artifact-path: ${{ steps.upload.outputs.artifact-path }}
    steps:
      - name: Log build info
        run: |
          echo "=== Build Info ==="
          echo "Platform: macOS Apple Silicon (aarch64)"
          echo "Runner: ${{ runner.os }} ${{ runner.arch }}"
          echo "Ref: ${{ github.ref }}"
          echo "Event: ${{ github.event_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "=================="

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log environment
        run: |
          echo "=== Environment ==="
          echo "Node version: $(node --version 2>/dev/null || echo 'not installed')"
          echo "pnpm version: $(pnpm --version 2>/dev/null || echo 'not installed')"
          echo "Rust version: $(rustc --version 2>/dev/null || echo 'not installed')"
          echo "Cargo version: $(cargo --version 2>/dev/null || echo 'not installed')"
          echo "==================="

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install macOS system dependencies
        run: |
          echo "=== Installing macOS system dependencies ==="
          brew install ffmpeg pkg-config
          echo "PKG_CONFIG_PATH=$(brew --prefix)/lib/pkgconfig:$(brew --prefix ffmpeg)/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
          pkg-config --modversion libavutil
          echo "==========================================="

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: aarch64-apple-darwin

      - name: Verify Rust installation
        run: |
          echo "=== Rust Installation ==="
          rustc --version
          cargo --version
          rustup show
          rustup target list --installed
          echo "========================="

      - name: Install dependencies
        run: |
          echo "=== Installing Node dependencies ==="
          pnpm install
          echo "===================================="

      - name: Install Tauri CLI
        run: |
          echo "=== Installing Tauri CLI ==="
          cargo install tauri-cli --version '^2.0.0' --locked --verbose
          cargo tauri --version
          echo "============================"

      - name: Build Tauri app
        run: |
          echo "=== Building Tauri app for aarch64-apple-darwin ==="
          cargo tauri build --target aarch64-apple-darwin --verbose
          echo "==================================================="
        env:
          CI: true
          RUST_BACKTRACE: full

      - name: List build outputs
        run: |
          echo "=== Build outputs ==="
          ls -la src-tauri/target/aarch64-apple-darwin/release/ 2>/dev/null || echo 'release dir not found'
          ls -la src-tauri/target/aarch64-apple-darwin/release/bundle/ 2>/dev/null || echo 'bundle dir not found'
          find src-tauri/target/aarch64-apple-darwin/release/bundle -type f -name "*.dmg" 2>/dev/null || echo 'no dmg files found'
          find src-tauri/target/aarch64-apple-darwin/release/bundle -type f -name "*.app" 2>/dev/null || echo 'no app files found'
          echo "===================="

      - name: Prepare artifacts
        id: upload
        run: |
          echo "=== Preparing artifacts ==="
          mkdir -p release-artifacts
          echo "Copying DMG files..."
          cp src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg release-artifacts/ 2>/dev/null && echo "DMG files copied" || echo "No DMG files found"
          echo "Copying APP files..."
          cp -r src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app release-artifacts/ 2>/dev/null && echo "APP files copied" || echo "No APP files found"
          echo "Artifacts in release-artifacts:"
          ls -la release-artifacts/
          echo "artifact-path=release-artifacts" >> $GITHUB_OUTPUT
          echo "==========================="

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: subtitle-forge-macos-arm
          path: release-artifacts/*
          if-no-files-found: warn

  # Windows x86_64
  build-windows-x64:
    name: Build Windows x64
    runs-on: windows-latest
    timeout-minutes: 60
    continue-on-error: true
    outputs:
      artifact-path: ${{ steps.upload.outputs.artifact-path }}
    steps:
      - name: Log build info
        shell: pwsh
        run: |
          Write-Host "=== Build Info ==="
          Write-Host "Platform: Windows x64 (x86_64)"
          Write-Host "Runner: $env:RUNNER_OS $env:RUNNER_ARCH"
          Write-Host "Ref: $env:GITHUB_REF"
          Write-Host "Event: $env:GITHUB_EVENT_NAME"
          Write-Host "Commit: $env:GITHUB_SHA"
          Write-Host "=================="

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc

      - name: Setup vcpkg
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git "$env:RUNNER_TEMP\vcpkg"
          & "$env:RUNNER_TEMP\vcpkg\bootstrap-vcpkg.bat" -disableMetrics
          "VCPKG_ROOT=$env:RUNNER_TEMP\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKG_DEFAULT_TRIPLET=x64-windows" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKGRS_DYNAMIC=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install FFmpeg via vcpkg
        shell: pwsh
        run: |
          & "$env:RUNNER_TEMP\vcpkg\vcpkg.exe" install "ffmpeg[avcodec,avdevice,avfilter,avformat,swresample,swscale]:x64-windows" --clean-after-build
          & "$env:RUNNER_TEMP\vcpkg\vcpkg.exe" list | Select-String ffmpeg

      - name: Log environment
        shell: pwsh
        run: |
          function Get-Version($command, $label) {
            if (Get-Command $command -ErrorAction SilentlyContinue) {
              $version = & $command --version 2>$null
              Write-Host "${label}: $version"
            } else {
              Write-Host "${label}: not installed"
            }
          }

          Write-Host "=== Environment ==="
          Get-Version node "Node version"
          Get-Version pnpm "pnpm version"
          Get-Version rustc "Rust version"
          Get-Version cargo "Cargo version"
          Write-Host "==================="

      - name: Verify Rust installation
        shell: pwsh
        run: |
          Write-Host "=== Rust Installation ==="
          rustc --version
          cargo --version
          rustup show
          rustup target list --installed
          Write-Host "========================="

      - name: Install dependencies
        shell: pwsh
        run: |
          Write-Host "=== Installing Node dependencies ==="
          pnpm install
          Write-Host "===================================="

      - name: Install Tauri CLI
        shell: pwsh
        run: |
          Write-Host "=== Installing Tauri CLI ==="
          cargo install tauri-cli --version '^2.0.0' --locked --verbose
          cargo tauri --version
          Write-Host "============================"

      - name: Build Tauri app
        shell: pwsh
        run: |
          Write-Host "=== Building Tauri app for x86_64-pc-windows-msvc ==="
          cargo tauri build --target x86_64-pc-windows-msvc --verbose
          Write-Host "====================================================="
        env:
          CI: true
          RUST_BACKTRACE: full

      - name: List build outputs
        shell: pwsh
        run: |
          Write-Host "=== Build outputs ==="
          Get-ChildItem -Path "src-tauri/target/x86_64-pc-windows-msvc/release/" -ErrorAction SilentlyContinue | Select-Object -First 20
          Get-ChildItem -Path "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 20
          Get-ChildItem -Path "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/" -Filter "*.msi" -Recurse -ErrorAction SilentlyContinue
          Get-ChildItem -Path "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/" -Filter "*.exe" -Recurse -ErrorAction SilentlyContinue
          Write-Host "===================="

      - name: Prepare artifacts
        id: upload
        shell: pwsh
        run: |
          Write-Host "=== Preparing artifacts ==="
          New-Item -ItemType Directory -Force -Path release-artifacts
          Write-Host "Copying MSI files..."
          Copy-Item -Path "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi" -Destination "release-artifacts/" -ErrorAction SilentlyContinue
          if ($?) { Write-Host "MSI files copied" } else { Write-Host "No MSI files found" }
          Write-Host "Copying NSIS files..."
          Copy-Item -Path "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe" -Destination "release-artifacts/" -ErrorAction SilentlyContinue
          if ($?) { Write-Host "NSIS files copied" } else { Write-Host "No NSIS files found" }
          Write-Host "Artifacts in release-artifacts:"
          Get-ChildItem -Path "release-artifacts/"
          echo "artifact-path=release-artifacts" >> $env:GITHUB_OUTPUT
          Write-Host "==========================="

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: subtitle-forge-windows-x64
          path: release-artifacts/*
          if-no-files-found: warn

  # Windows ARM64
  build-windows-arm:
    name: Build Windows ARM64
    runs-on: windows-11-arm
    timeout-minutes: 60
    continue-on-error: true
    outputs:
      artifact-path: ${{ steps.upload.outputs.artifact-path }}
    steps:
      - name: Log build info
        shell: pwsh
        run: |
          Write-Host "=== Build Info ==="
          Write-Host "Platform: Windows ARM64 (aarch64)"
          Write-Host "Runner: $env:RUNNER_OS $env:RUNNER_ARCH"
          Write-Host "Ref: $env:GITHUB_REF"
          Write-Host "Event: $env:GITHUB_EVENT_NAME"
          Write-Host "Commit: $env:GITHUB_SHA"
          Write-Host "=================="

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'arm64'

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: aarch64-pc-windows-msvc

      - name: Setup vcpkg
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git "$env:RUNNER_TEMP\vcpkg"
          & "$env:RUNNER_TEMP\vcpkg\bootstrap-vcpkg.bat" -disableMetrics
          "VCPKG_ROOT=$env:RUNNER_TEMP\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKG_DEFAULT_TRIPLET=arm64-windows" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKGRS_DYNAMIC=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install FFmpeg via vcpkg
        shell: pwsh
        run: |
          & "$env:RUNNER_TEMP\vcpkg\vcpkg.exe" install "ffmpeg[avcodec,avdevice,avfilter,avformat,swresample,swscale]:arm64-windows" --clean-after-build
          & "$env:RUNNER_TEMP\vcpkg\vcpkg.exe" list | Select-String ffmpeg

      - name: Log environment
        shell: pwsh
        run: |
          function Get-Version($command, $label) {
            if (Get-Command $command -ErrorAction SilentlyContinue) {
              $version = & $command --version 2>$null
              Write-Host "${label}: $version"
            } else {
              Write-Host "${label}: not installed"
            }
          }

          Write-Host "=== Environment ==="
          Get-Version node "Node version"
          Get-Version pnpm "pnpm version"
          Get-Version python "Python version"
          Get-Version rustc "Rust version"
          Get-Version cargo "Cargo version"
          Write-Host "==================="

      - name: Verify Rust installation
        shell: pwsh
        run: |
          Write-Host "=== Rust Installation ==="
          rustc --version
          cargo --version
          rustup show
          rustup target list --installed
          Write-Host "========================="

      - name: Install dependencies
        shell: pwsh
        run: |
          Write-Host "=== Installing Node dependencies ==="
          pnpm install
          Write-Host "===================================="

      - name: Install Tauri CLI
        shell: pwsh
        run: |
          Write-Host "=== Installing Tauri CLI ==="
          cargo install tauri-cli --version '^2.0.0' --locked --verbose
          cargo tauri --version
          Write-Host "============================"

      - name: Build Tauri app
        shell: pwsh
        run: |
          Write-Host "=== Building Tauri app for aarch64-pc-windows-msvc ==="
          cargo tauri build --target aarch64-pc-windows-msvc --verbose
          Write-Host "======================================================"
        env:
          CI: true
          RUST_BACKTRACE: full
          PYO3_PYTHON: python

      - name: List build outputs
        shell: pwsh
        run: |
          Write-Host "=== Build outputs ==="
          Get-ChildItem -Path "src-tauri/target/aarch64-pc-windows-msvc/release/" -ErrorAction SilentlyContinue | Select-Object -First 20
          Get-ChildItem -Path "src-tauri/target/aarch64-pc-windows-msvc/release/bundle/" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 20
          Get-ChildItem -Path "src-tauri/target/aarch64-pc-windows-msvc/release/bundle/" -Filter "*.msi" -Recurse -ErrorAction SilentlyContinue
          Get-ChildItem -Path "src-tauri/target/aarch64-pc-windows-msvc/release/bundle/" -Filter "*.exe" -Recurse -ErrorAction SilentlyContinue
          Write-Host "===================="

      - name: Prepare artifacts
        id: upload
        shell: pwsh
        run: |
          Write-Host "=== Preparing artifacts ==="
          New-Item -ItemType Directory -Force -Path release-artifacts
          Write-Host "Copying MSI files..."
          Copy-Item -Path "src-tauri/target/aarch64-pc-windows-msvc/release/bundle/msi/*.msi" -Destination "release-artifacts/" -ErrorAction SilentlyContinue
          if ($?) { Write-Host "MSI files copied" } else { Write-Host "No MSI files found" }
          Write-Host "Copying NSIS files..."
          Copy-Item -Path "src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/*.exe" -Destination "release-artifacts/" -ErrorAction SilentlyContinue
          if ($?) { Write-Host "NSIS files copied" } else { Write-Host "No NSIS files found" }
          Write-Host "Artifacts in release-artifacts:"
          Get-ChildItem -Path "release-artifacts/"
          echo "artifact-path=release-artifacts" >> $env:GITHUB_OUTPUT
          Write-Host "==========================="

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: subtitle-forge-windows-arm
          path: release-artifacts/*
          if-no-files-found: warn

  # Linux x86_64
  build-linux-x64:
    name: Build Linux x64
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    continue-on-error: true
    outputs:
      artifact-path: ${{ steps.upload.outputs.artifact-path }}
    steps:
      - name: Log build info
        run: |
          echo "=== Build Info ==="
          echo "Platform: Linux x64 (x86_64)"
          echo "Runner: ${{ runner.os }} ${{ runner.arch }}"
          echo "Ref: ${{ github.ref }}"
          echo "Event: ${{ github.event_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "=================="

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log environment
        run: |
          echo "=== Environment ==="
          echo "Node version: $(node --version 2>/dev/null || echo 'not installed')"
          echo "pnpm version: $(pnpm --version 2>/dev/null || echo 'not installed')"
          echo "Rust version: $(rustc --version 2>/dev/null || echo 'not installed')"
          echo "Cargo version: $(cargo --version 2>/dev/null || echo 'not installed')"
          echo "==================="

      - name: Install system dependencies
        run: |
          echo "=== Installing system dependencies ==="
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf pkg-config libavcodec-dev libavdevice-dev libavfilter-dev libavformat-dev libavutil-dev libswresample-dev libswscale-dev
          pkg-config --modversion libavutil
          echo "====================================="

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: x86_64-unknown-linux-gnu

      - name: Verify Rust installation
        run: |
          echo "=== Rust Installation ==="
          rustc --version
          cargo --version
          rustup show
          rustup target list --installed
          echo "========================="

      - name: Install dependencies
        run: |
          echo "=== Installing Node dependencies ==="
          pnpm install
          echo "===================================="

      - name: Install Tauri CLI
        run: |
          echo "=== Installing Tauri CLI ==="
          cargo install tauri-cli --version '^2.0.0' --locked --verbose
          cargo tauri --version
          echo "============================"

      - name: Build Tauri app
        run: |
          echo "=== Building Tauri app for x86_64-unknown-linux-gnu ==="
          cargo tauri build --target x86_64-unknown-linux-gnu --verbose
          echo "======================================================="
        env:
          CI: true
          RUST_BACKTRACE: full

      - name: List build outputs
        run: |
          echo "=== Build outputs ==="
          ls -la src-tauri/target/x86_64-unknown-linux-gnu/release/ 2>/dev/null || echo 'release dir not found'
          ls -la src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/ 2>/dev/null || echo 'bundle dir not found'
          find src-tauri/target/x86_64-unknown-linux-gnu/release/bundle -type f -name "*.deb" 2>/dev/null || echo 'no deb files found'
          find src-tauri/target/x86_64-unknown-linux-gnu/release/bundle -type f -name "*.AppImage" 2>/dev/null || echo 'no AppImage files found'
          find src-tauri/target/x86_64-unknown-linux-gnu/release/bundle -type f -name "*.rpm" 2>/dev/null || echo 'no rpm files found'
          echo "===================="

      - name: Prepare artifacts
        id: upload
        run: |
          echo "=== Preparing artifacts ==="
          mkdir -p release-artifacts
          echo "Copying DEB files..."
          cp src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb release-artifacts/ 2>/dev/null && echo "DEB files copied" || echo "No DEB files found"
          echo "Copying AppImage files..."
          cp src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage release-artifacts/ 2>/dev/null && echo "AppImage files copied" || echo "No AppImage files found"
          echo "Copying RPM files..."
          cp src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm release-artifacts/ 2>/dev/null && echo "RPM files copied" || echo "No RPM files found"
          echo "Artifacts in release-artifacts:"
          ls -la release-artifacts/
          echo "artifact-path=release-artifacts" >> $GITHUB_OUTPUT
          echo "==========================="

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: subtitle-forge-linux-x64
          path: release-artifacts/*
          if-no-files-found: warn

  # Create GitHub Release and upload all artifacts (only for tags)
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-macos-intel, build-macos-arm, build-windows-x64, build-windows-arm, build-linux-x64]
    # Only create release for tag pushes and workflow_dispatch, not for branch pushes
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/release-'))) &&
      (needs.build-macos-intel.result == 'success' || needs.build-macos-arm.result == 'success' || needs.build-windows-x64.result == 'success' || needs.build-windows-arm.result == 'success' || needs.build-linux-x64.result == 'success')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log release info
        run: |
          echo "=== Release Info ==="
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "==================="

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi
          echo "Version: $(cat $GITHUB_OUTPUT | grep version)"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: subtitle-forge-*

      - name: List artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          find artifacts -type f -name "*" | sort
          echo "============================"
          echo "Artifact sizes:"
          find artifacts -type f -name "*" -exec ls -lh {} \;
          echo "============================"

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          draft: ${{ github.event.inputs.draft || false }}
          prerelease: ${{ github.event.inputs.prerelease || false }}
          generate_release_notes: true
          files: |
            artifacts/subtitle-forge-macos-intel/*
            artifacts/subtitle-forge-macos-arm/*
            artifacts/subtitle-forge-windows-x64/*
            artifacts/subtitle-forge-windows-arm/*
            artifacts/subtitle-forge-linux-x64/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Summary
        run: |
          echo "## Release ${{ steps.version.outputs.version }} Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| macOS Intel | ${{ needs.build-macos-intel.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS Apple Silicon | ${{ needs.build-macos-arm.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows x64 | ${{ needs.build-windows-x64.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows ARM64 | ${{ needs.build-windows-arm.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux x64 | ${{ needs.build-linux-x64.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Release URL: ${{ steps.create_release.outputs.url }}" >> $GITHUB_STEP_SUMMARY

  # Build summary for branch pushes (no release created)
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-macos-intel, build-macos-arm, build-windows-x64, build-windows-arm, build-linux-x64]
    if: always()
    steps:
      - name: Summarize build results
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ github.ref }}" == refs/tags/release-* ]]; then
            echo "**Trigger:** Release Tag ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ github.ref }}" == refs/heads/ci-sandbox/dev-* ]] || [[ "${{ github.ref }}" == refs/heads/dev-* ]]; then
            echo "**Trigger:** Development Branch ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| macOS Intel | ${{ needs.build-macos-intel.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS Apple Silicon | ${{ needs.build-macos-arm.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows x64 | ${{ needs.build-windows-x64.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows ARM64 | ${{ needs.build-windows-arm.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux x64 | ${{ needs.build-linux-x64.result }} |" >> $GITHUB_STEP_SUMMARY
